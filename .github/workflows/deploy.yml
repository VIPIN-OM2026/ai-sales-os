name: CI/CD — AI Sales OS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy-frontend:
    name: Deploy Frontend → GitHub Pages
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm install --legacy-peer-deps
      - run: npm run build
        env:
          NODE_ENV: production
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true

  deploy-backend:
    name: Deploy Backend → Railway
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Railway CLI
        run: npm install -g @railway/cli@latest

      - name: Deploy and write URL to repo
        working-directory: ./backend-src
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set +e

          railway init --name "ai-sales-os" 2>&1

          railway variables set \
            NODE_ENV=production PORT=3001 \
            "DATABASE_URL=$DATABASE_URL" \
            JWT_ACCESS_EXPIRES=15m JWT_REFRESH_EXPIRES=7d \
            "UPSTASH_REDIS_REST_URL=$UPSTASH_REDIS_REST_URL" \
            "UPSTASH_REDIS_REST_TOKEN=$UPSTASH_REDIS_REST_TOKEN" \
            AI_PROVIDER=anthropic \
            FRONTEND_URL=https://vipin-om2026.github.io 2>&1

          railway up --detach 2>&1

          # Generate public domain and capture it
          railway domain 2>&1 > /tmp/domain_out.txt
          cat /tmp/domain_out.txt

          # Extract URL from domain output
          DOMAIN=$(cat /tmp/domain_out.txt | grep -oE '[a-z0-9-]+\.up\.railway\.app' | head -1)

          if [ -z "$DOMAIN" ]; then
            # Try service status
            railway status 2>&1 > /tmp/status_out.txt
            cat /tmp/status_out.txt
            DOMAIN=$(cat /tmp/status_out.txt | grep -oE '[a-z0-9-]+\.up\.railway\.app' | head -1)
          fi

          echo "RAILWAY DOMAIN: $DOMAIN"

          # Write URL to a file in the repo so we can read it back
          cd $GITHUB_WORKSPACE
          echo "https://$DOMAIN" > BACKEND_URL.txt
          cat BACKEND_URL.txt

          git config user.email "vipin.p@opsmonsters.com"
          git config user.name "CI Bot"
          git add BACKEND_URL.txt
          git diff --staged --quiet || git commit -m "chore: update backend URL [skip ci]"
          git push "https://x-access-token:${GH_TOKEN}@github.com/VIPIN-OM2026/ai-sales-os.git" HEAD:main 2>&1 || true

name: CI/CD — AI Sales OS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # ─── JOB 1: Deploy Frontend → GitHub Pages ─────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend → GitHub Pages
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build React app
        run: npm run build
        env:
          NODE_ENV: production

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true

  # ─── JOB 2: Deploy Backend → Railway ───────────────────────────────────────
  deploy-backend:
    name: Deploy Backend → Railway
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli@latest

      - name: Deploy to Railway
        working-directory: ./backend-src
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          echo "Railway CLI version:"
          railway version

          echo "Deploying to Railway..."
          railway up \
            --service "ai-sales-os-api" \
            --detach \
            --yes 2>&1

      - name: Set Railway environment variables
        working-directory: ./backend-src
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
        run: |
          railway variables --set "NODE_ENV=production" \
            --set "PORT=3001" \
            --set "DATABASE_URL=$DATABASE_URL" \
            --set "JWT_ACCESS_EXPIRES=15m" \
            --set "JWT_REFRESH_EXPIRES=7d" \
            --set "UPSTASH_REDIS_REST_URL=$UPSTASH_REDIS_REST_URL" \
            --set "UPSTASH_REDIS_REST_TOKEN=$UPSTASH_REDIS_REST_TOKEN" \
            --set "AI_PROVIDER=anthropic" \
            --set "FRONTEND_URL=https://vipin-om2026.github.io" \
            --yes 2>&1 || echo "Variables already set"

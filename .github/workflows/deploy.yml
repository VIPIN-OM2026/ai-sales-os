name: CI/CD — AI Sales OS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # ─── JOB 1: Deploy Frontend → GitHub Pages ─────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend → GitHub Pages
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: |
          echo "Node: $(node --version), npm: $(npm --version)" | tee -a $GITHUB_STEP_SUMMARY
          npm install --legacy-peer-deps 2>&1 | tee -a $GITHUB_STEP_SUMMARY

      - name: Build React app
        run: |
          npm run build 2>&1 | tee -a $GITHUB_STEP_SUMMARY
        env:
          NODE_ENV: production

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true

  # ─── JOB 2: Deploy Backend → Railway ───────────────────────────────────────
  deploy-backend:
    name: Deploy Backend → Railway
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Railway CLI
        run: npm install -g @railway/cli@latest

      - name: Deploy to Railway
        working-directory: ./backend-src
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
        run: |
          set +e
          railway whoami 2>&1 | tee -a $GITHUB_STEP_SUMMARY
          railway init --name "ai-sales-os" 2>&1 | tee -a $GITHUB_STEP_SUMMARY
          railway variables set \
            NODE_ENV=production PORT=3001 \
            "DATABASE_URL=$DATABASE_URL" \
            JWT_ACCESS_EXPIRES=15m JWT_REFRESH_EXPIRES=7d \
            "UPSTASH_REDIS_REST_URL=$UPSTASH_REDIS_REST_URL" \
            "UPSTASH_REDIS_REST_TOKEN=$UPSTASH_REDIS_REST_TOKEN" \
            AI_PROVIDER=anthropic \
            FRONTEND_URL=https://vipin-om2026.github.io 2>&1 | tee -a $GITHUB_STEP_SUMMARY
          railway up --detach 2>&1 | tee -a $GITHUB_STEP_SUMMARY
          railway status 2>&1 | tee -a $GITHUB_STEP_SUMMARY

name: CI/CD — AI Sales OS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # ─── JOB 1: Build & Deploy Frontend to GitHub Pages ────────────────────────
  deploy-frontend:
    name: Deploy Frontend → GitHub Pages
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build React app
        run: npm run build
        env:
          NODE_ENV: production

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true

  # ─── JOB 2: Deploy Backend to Render (includes DB migration) ───────────────
  deploy-backend:
    name: Deploy Backend → Render
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check if Render service exists, create or redeploy
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
        run: |
          python3 << 'PYEOF'
          import json, os, urllib.request, urllib.error, time

          API_KEY   = os.environ["RENDER_API_KEY"]
          DB_URL    = os.environ["DATABASE_URL"]
          REDIS_URL = os.environ["UPSTASH_REDIS_REST_URL"]
          REDIS_TOK = os.environ["UPSTASH_REDIS_REST_TOKEN"]

          HEADERS = {
              "Authorization": f"Bearer {API_KEY}",
              "Content-Type": "application/json",
              "Accept": "application/json",
          }

          def call(method, path, body=None):
              url = f"https://api.render.com/v1{path}"
              data = json.dumps(body).encode() if body else None
              req = urllib.request.Request(url, data=data, headers=HEADERS, method=method)
              try:
                  with urllib.request.urlopen(req, timeout=30) as r:
                      return json.loads(r.read())
              except urllib.error.HTTPError as e:
                  return json.loads(e.read())

          # ── Get owner ID ──────────────────────────────────────────────────
          owners = call("GET", "/owners?limit=1")
          owner_id = owners[0]["owner"]["id"] if owners and isinstance(owners, list) else None
          print(f"Owner ID: {owner_id}")

          # ── Check existing services ───────────────────────────────────────
          services = call("GET", "/services?limit=20")
          service_id = None
          if isinstance(services, list):
              for item in services:
                  svc = item.get("service", {})
                  if svc.get("name") == "ai-sales-os-api":
                      service_id = svc["id"]
                      print(f"Found existing service: {service_id}")
                      break

          if not service_id:
              print("Creating new Render service...")
              payload = {
                  "type": "web_service",
                  "name": "ai-sales-os-api",
                  "ownerId": owner_id,
                  "repo": "https://github.com/VIPIN-OM2026/ai-sales-os",
                  "branch": "main",
                  "rootDir": "backend-src",
                  "buildCommand": "npm install && npx prisma generate && npx prisma migrate deploy && npm run build",
                  "startCommand": "node dist/main",
                  "plan": "free",
                  "region": "oregon",
                  "healthCheckPath": "/api/v1/health",
                  "envVars": [
                      {"key": "NODE_ENV",               "value": "production"},
                      {"key": "PORT",                   "value": "3001"},
                      {"key": "DATABASE_URL",            "value": DB_URL},
                      {"key": "JWT_ACCESS_SECRET",       "generateValue": True},
                      {"key": "JWT_REFRESH_SECRET",      "generateValue": True},
                      {"key": "JWT_ACCESS_EXPIRES",      "value": "15m"},
                      {"key": "JWT_REFRESH_EXPIRES",     "value": "7d"},
                      {"key": "UPSTASH_REDIS_REST_URL",  "value": REDIS_URL},
                      {"key": "UPSTASH_REDIS_REST_TOKEN","value": REDIS_TOK},
                      {"key": "AI_PROVIDER",             "value": "anthropic"},
                      {"key": "FRONTEND_URL",            "value": "https://vipin-om2026.github.io"},
                  ],
              }
              result = call("POST", "/services", payload)
              svc = result.get("service", result)
              sid = svc.get("id", "unknown")
              print(f"✅ Service created: {sid}")
              print(f"   URL: https://ai-sales-os-api.onrender.com")
          else:
              print("Triggering redeploy...")
              result = call("POST", f"/services/{service_id}/deploys", {"clearCache": "do_not_clear"})
              print(f"✅ Redeploy triggered — status: {result.get('status', 'queued')}")
              print(f"   Deploy ID: {result.get('id', 'unknown')}")

          PYEOF

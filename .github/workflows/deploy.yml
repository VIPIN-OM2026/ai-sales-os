name: CI/CD — AI Sales OS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # ─── JOB 1: Deploy Frontend → GitHub Pages ─────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend → GitHub Pages
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install & Build
        run: npm install && npm run build
        env:
          NODE_ENV: production

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true

  # ─── JOB 2: Deploy Backend → Railway ───────────────────────────────────────
  deploy-backend:
    name: Deploy Backend → Railway
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Railway CLI
        run: npm install -g @railway/cli@latest

      - name: Check Railway CLI and token
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          echo "Railway CLI version: $(railway --version)"
          echo "Whoami:"
          railway whoami 2>&1
          echo "---"

      - name: List Railway projects
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          echo "Existing projects:"
          railway list 2>&1
          echo "---"

      - name: Create project and deploy
        working-directory: ./backend-src
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
        run: |
          set -e

          # Initialize project if not linked
          if [ ! -f .railway/config.json ]; then
            echo "No railway project linked — creating new project..."
            railway init --name "ai-sales-os" 2>&1
          fi

          echo "Setting env vars..."
          railway variables set \
            NODE_ENV=production \
            PORT=3001 \
            "DATABASE_URL=$DATABASE_URL" \
            JWT_ACCESS_EXPIRES=15m \
            JWT_REFRESH_EXPIRES=7d \
            "UPSTASH_REDIS_REST_URL=$UPSTASH_REDIS_REST_URL" \
            "UPSTASH_REDIS_REST_TOKEN=$UPSTASH_REDIS_REST_TOKEN" \
            AI_PROVIDER=anthropic \
            FRONTEND_URL=https://vipin-om2026.github.io \
            2>&1

          echo "Deploying..."
          railway up --detach 2>&1

          echo "Getting service URL..."
          railway status 2>&1

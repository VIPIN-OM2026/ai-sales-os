# Render.com — One-click deploy config
# Free tier: 750 hrs/month, spins down after 15min inactivity

services:
  - type: web
    name: ai-sales-os-api
    runtime: node
    plan: free
    region: oregon

    buildCommand: |
      npm install
      npx prisma generate
      npx prisma migrate deploy
      npm run build

    startCommand: node dist/main

    rootDir: backend-src

    healthCheckPath: /api/v1/health

    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        fromDatabase:
          name: ai-sales-os-db
          property: connectionString
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRES
        value: 15m
      - key: JWT_REFRESH_EXPIRES
        value: 7d
      - key: REDIS_HOST
        fromDatabase:
          name: ai-sales-os-redis
          property: host
      - key: AI_PROVIDER
        value: anthropic
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: WHATSAPP_ACCESS_TOKEN
        sync: false
      - key: FRONTEND_URL
        value: https://vipin-om2026.github.io
